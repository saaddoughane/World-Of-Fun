<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasse Amazonienne</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="assets/jungle.png">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <main class="jeu-container">
        
        <div class="titre-zone">

            <h1 class="titre-principal">
                <span class="titre-mot">Chasse</span>
                <span class="titre-mot amazonie">Amazonienne</span>
            </h1>

            <a href="../../chasse.html" class="bouton-retour">Retour</a>
        </div>

 
        <div class="zone-canvas">
            <canvas id="canvas" width="800" height="600"></canvas>
            

            <div class="panier-container">
                <img id="panier-img" src="./assets/panier0.png" alt="Panier">
            </div>

        </div>


        <div class="info-panel">

            
            <div class="info-item">
                <img src="./assets/banana.png" alt="banane" class="info-icon">
                <span>Banane jaune<strong>50 pts</strong></span>
            </div>

            <div class="info-item">
                <img src="./assets/green-banana.png" alt="banane verte" class="info-icon">
                <span>Banane verte<strong>100 pts</strong></span>
            </div>

            <div class="info-item">
                <img src="./assets/two-bananas.png" alt="régime" class="info-icon">
                <span>Régime<strong>200 pts</strong></span>
            </div>
           
            <div class="info-item">
                <img src="./assets/ananas.png" alt="ananas" class="info-icon">
                <span>Ananas<strong>500 pts</strong></span>
            </div>

        </div>

        <p class="controls">
            <strong>ESPACE</strong> Démarrer · <strong>Clic</strong> Attraper · <strong>ESC</strong> Scores
        </p>
        
    </main>

    <footer class="footer-credits">
        <p>
            Icônes : 
            <a href="https://www.flaticon.com" target="_blank">Flaticon</a>
            (Sophia tkx, Park Jisun, max.icons)
        </p>
    </footer>

    <script src="../../js/main.js"></script>
    <script type="module" src="./js/script.js"></script>
</body>
</html>
